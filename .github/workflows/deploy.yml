name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} -t vivek2707/my-react-app:${{ github.run_number }} .
          docker tag vivek2707/my-react-app:${{ github.run_number }} vivek2707/my-react-app:latest

      - name: Push Docker Image
        run: |
          docker push vivek2707/my-react-app:${{ github.run_number }}
          docker push vivek2707/my-react-app:latest

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop react-app || true
            docker rm react-app || true
            docker pull vivek2707/my-react-app:latest
            docker run -d --name react-app -p 80:80 vivek2707/my-react-app:latest